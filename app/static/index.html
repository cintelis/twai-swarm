          <label for="repoBrief">Brief</label>
          <textarea id="repoBrief" required placeholder="Describe the feature(s) to add to this repo. Be specific about endpoints, files to modify, and tests to add."></textarea>

          <button type="submit" id="repoSubmitBtn" class="btn btn-primary" disabled>Start workflow</button>
        </form>
        <div id="repoSubmitAlert"></div>
      </div>

      <!-- New-scaffold tab -->
      <div class="tab-panel" data-tab-panel="new" hidden>
        <label>Try an example brief</label>
        <div class="examples-grid" id="examplesGrid"></div>

        <form id="submitForm">
          <label for="name">Name</label>
          <input type="text" id="name" required placeholder="my-cli-tool" autocomplete="off" />

          <label for="brief">Brief</label>
          <textarea id="brief" required placeholder="Build a CLI tool that summarises git commits using idiomatic Rust..."></textarea>

          <div class="checkbox-row">
            <input type="checkbox" id="auto_approve" />
            <label for="auto_approve">Skip approval gate (auto-approve after architect)</label>
          </div>

          <button type="submit" id="submitBtn" class="btn btn-primary">Start workflow</button>
        </form>
        <div id="submitAlert"></div>
      </div>
    </div>

    <div class="section-label">Recent projects</div>
    <div id="projectsListContainer"><div class="card empty">Loading…</div></div>
  `;

  // ── Tab switching ────────────────────────────────────────
  const tabBtns = document.querySelectorAll('.tab-btn');
  const tabPanels = document.querySelectorAll('.tab-panel');
  for (const btn of tabBtns) {
    btn.addEventListener('click', () => {
      const target = btn.dataset.tab;
      for (const b of tabBtns) b.classList.toggle('active', b === btn);
      for (const p of tabPanels) p.hidden = p.dataset.tabPanel !== target;
    });
  }

  // ── New-scaffold tab: examples + submit ──────────────────
  const examplesGrid = document.getElementById('examplesGrid');
  for (const ex of EXAMPLE_BRIEFS) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'example-btn';
    btn.innerHTML = `<span class="example-icon">▸</span>${escapeHtml(ex.label)}`;
    btn.addEventListener('click', () => {
      document.getElementById('name').value = ex.name;
      document.getElementById('brief').value = ex.brief;
      document.getElementById('submitAlert').innerHTML = '';
      document.getElementById('brief').focus();
    });
    examplesGrid.appendChild(btn);
  }

  document.getElementById('submitForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('submitAlert');
    const btn = document.getElementById('submitBtn');
    alertEl.innerHTML = '';
    btn.disabled = true;
    btn.textContent = 'Starting…';
    try {
      const body = {
        name: document.getElementById('name').value,
        brief: document.getElementById('brief').value,
        auto_approve: document.getElementById('auto_approve').checked,
      };
      const r = await apiFetch('/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
      const data = await r.json();
      location.hash = '#/p/' + data.workflow_id;
    } catch (err) {
      alertEl.innerHTML = `<div class="alert alert-error">Couldn't start: ${escapeHtml(err.message)}</div>`;
      btn.disabled = false;
      btn.textContent = 'Start workflow';
    }
  });

  // ── Existing-repo tab: examples + repo picker + submit ──
  let selectedRepoForTask = null;   // { repo_owner, repo_name, default_branch }

  const featureExamplesGrid = document.getElementById('featureExamplesGrid');
  for (const ex of EXAMPLE_FEATURE_BRIEFS) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'example-btn';
    btn.innerHTML = `<span class="example-icon">▸</span>${escapeHtml(ex.label)}`;
    btn.addEventListener('click', () => {
      document.getElementById('repoBrief').value = ex.brief;
      document.getElementById('repoSubmitAlert').innerHTML = '';
      document.getElementById('repoBrief').focus();
    });
    featureExamplesGrid.appendChild(btn);
  }

  function setSelectedRepo(install, selection) {
    selectedRepoForTask = selection ? {
      repo_owner: selection.repo_owner,
      repo_name: selection.repo_name,
      default_branch: selection.default_branch || 'main',
    } : null;

    const display = document.getElementById('selectedRepoDisplay');
    const pickBtn = document.getElementById('repoPickerBtn');
    const submitBtn = document.getElementById('repoSubmitBtn');

    if (selectedRepoForTask) {
      document.getElementById('selectedRepoFullName').textContent =
        `${selectedRepoForTask.repo_owner}/${selectedRepoForTask.repo_name}`;
      document.getElementById('selectedRepoMeta').textContent =
        ` · default: ${selectedRepoForTask.default_branch}`;
      display.hidden = false;
      pickBtn.hidden = true;
      // Pre-fill the branch input with the repo's default unless user overrode.
      const branchEl = document.getElementById('branch');
      if (!branchEl.dataset.userEdited) branchEl.value = selectedRepoForTask.default_branch;
      submitBtn.disabled = false;
    } else {
      display.hidden = true;
      pickBtn.hidden = false;
      submitBtn.disabled = true;
    }
  }

  document.getElementById('branch').addEventListener('input', (e) => {
    e.target.dataset.userEdited = '1';
  });

  async function handleRepoPick() {
    const alertEl = document.getElementById('repoSubmitAlert');
    alertEl.innerHTML = '';
    const result = await pickGitHubRepo();
    if (result.ok) {
      setSelectedRepo(result.install, result.selection);
      return;
    }
    if (result.reason === 'cancelled') return;
    if (result.reason === 'no_installations') {
      alertEl.innerHTML =
        `<div class="alert">No GitHub accounts connected. ` +
        `<a href="${escapeHtml(result.install_url)}" target="_blank" rel="noopener">Install the swarm GitHub App</a>, then come back and pick a repo.</div>`;
      return;
    }
    if (result.reason === 'app_unconfigured') {
      alertEl.innerHTML = `<div class="alert alert-error">GitHub App not configured on this server (set GITHUB_APP_ID + private key).</div>`;
      return;
    }
    alertEl.innerHTML = `<div class="alert alert-error">${escapeHtml(result.message || 'Repo picker failed')}</div>`;
  }

  document.getElementById('repoPickerBtn').addEventListener('click', handleRepoPick);
  document.getElementById('changeRepoBtn').addEventListener('click', handleRepoPick);

  document.getElementById('repoTaskForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('repoSubmitAlert');
    const btn = document.getElementById('repoSubmitBtn');
    alertEl.innerHTML = '';
    if (!selectedRepoForTask) {
      alertEl.innerHTML = `<div class="alert alert-error">Pick a repo first.</div>`;
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Starting…';
    try {
      const body = {
        repo_url: `https://github.com/${selectedRepoForTask.repo_owner}/${selectedRepoForTask.repo_name}`,
        branch: document.getElementById('branch').value.trim() || 'main',
        brief: document.getElementById('repoBrief').value,
        repo_name: selectedRepoForTask.repo_name,
      };
      const r = await apiFetch('/repo-tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
      const data = await r.json();
      location.hash = '#/p/' + data.workflow_id;
    } catch (err) {
      alertEl.innerHTML = `<div class="alert alert-error">Couldn't start: ${escapeHtml(err.message)}</div>`;
      btn.disabled = false;
      btn.textContent = 'Start workflow';
    }
  });

  // Lazy-load recent projects
  loadRecentProjects();
}

async function loadRecentProjects() {
  const container = document.getElementById('projectsListContainer');
  if (!container) return;
  try {
    const r = await apiFetch('/projects?limit=20');
    if (!r.ok) {
      container.innerHTML = `<div class="card empty">Couldn't load recent projects.</div>`;
      return;
    }
    const data = await r.json();
    const projects = data.projects || [];
    if (projects.length === 0) {
      container.innerHTML = `<div class="card empty">No projects yet. Pick an example above or write your own brief.</div>`;
      return;
    }
    let html = `<div class="projects-grid">`;
    for (const p of projects) {
      const cost = p.total_cost_usd ? `$${parseFloat(p.total_cost_usd).toFixed(3)}` : '';
      const tasks = `${p.done_count || 0}/${p.task_count || 0} tasks`;
      const when = p.created_at ? new Date(p.created_at).toLocaleString() : '';
      html += `
        <a class="project-card" href="#/p/${escapeHtml(p.workflow_id)}">
          <div class="project-card-head">
            <span class="project-card-name">${escapeHtml(p.name)}</span>
            <span class="badge ${p.status}">${escapeHtml(p.status)}</span>
          </div>
          <div class="project-card-brief">${escapeHtml(p.brief || '')}</div>
          <div class="project-card-meta">
            <span>${when}</span>
            <span>${tasks}</span>
            ${cost ? `<span>${cost}</span>` : ''}
            ${p.failed_count > 0 ? `<span style="color: var(--red)">${p.failed_count} failed</span>` : ''}
          </div>
        </a>
      `;
    }
    html += `</div>`;
    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = `<div class="card empty">Error loading: ${escapeHtml(err.message)}</div>`;
  }
}

// ─── Status view ────────────────────────────────────────
async function showProject(workflowId) {
  crumb.innerHTML = `<a href="#/">← New project</a>`;
  root.innerHTML = `<div class="card empty">Loading <code>${escapeHtml(workflowId)}</code>…</div>`;
  await refreshProject(workflowId);
  pollTimer = setInterval(() => refreshProject(workflowId), 3000);
}

async function refreshProject(workflowId) {
  try {
    const r = await apiFetch(`/projects/${workflowId}`);
    if (r.status === 404) {
      root.innerHTML = `<div class="card empty">Project not found: <code>${escapeHtml(workflowId)}</code></div>`;
      if (pollTimer) clearInterval(pollTimer);
      return;
    }
    if (!r.ok) {
      root.innerHTML = `<div class="card error-msg">Failed to load (HTTP ${r.status})</div>`;
      return;
    }
    const data = await r.json();
    renderProject(data);
    if (['COMPLETED', 'FAILED', 'CANCELED', 'TERMINATED'].includes(data.status)) {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }
  } catch (err) {
    root.innerHTML = `<div class="card error-msg">Error: ${escapeHtml(err.message)}</div>`;
  }
}

// Preserved across re-renders so expanded rows don't collapse on each poll.
const expandedTasks = new Set();

function renderProject(data) {
  const { workflow_id, status, awaiting_approval, project, tasks } = data;

  let html = `
    <div class="card">
      <div class="card-head">
        <div class="card-title">${escapeHtml(project.name)}</div>
        <span class="badge ${status}">${status}</span>
      </div>
      <div class="brief-text">${escapeHtml(project.brief)}</div>
      <div style="margin-top: 14px;"><code>${escapeHtml(workflow_id)}</code></div>
    </div>
  `;

  // ── Final docs (when documenter is done) ────────────────
  const documenterTask = tasks.find(t => t.role === 'documenter' && t.status === 'done' && t.output);
  if (documenterTask && documenterTask.output) {
    const docs = documenterTask.output;
    html += `
      <div class="docs-card">
        <div class="docs-eyebrow">Final Docs</div>
        <h2>${escapeHtml(docs.overview ? project.name : 'Documentation')}</h2>
        ${docs.overview ? `<div class="docs-overview">${escapeHtml(docs.overview)}</div>` : ''}
    `;
    if (Array.isArray(docs.sections)) {
      for (const sec of docs.sections) {
        html += `
          <div class="docs-section">
            <h3>${escapeHtml(sec.heading || '')}</h3>
            <div class="docs-body">${escapeHtml(sec.body || '')}</div>
          </div>
        `;
      }
    }
    html += `</div>`;
  }

  // ── Generated code (when coder is done) ─────────────────
  const coderTask = tasks.find(t => t.role === 'coder' && t.status === 'done' && t.output);
  if (coderTask && coderTask.output) {
    const out = coderTask.output;
    const isTruncated = out.parse_error === true && typeof out.raw_text === 'string';
    const hasFiles = Array.isArray(out.files) && out.files.length > 0;

    if (hasFiles || isTruncated) {
      html += `
        <div class="code-card">
          <div class="code-head">
            <div class="code-title">Generated scaffold ${out.language ? `<span class="meta">· ${escapeHtml(out.language)}</span>` : ''}</div>
            <div style="display:flex;gap:8px;">
              <button class="btn" data-download-id="${escapeHtml(workflow_id)}">Download .zip</button>
              <button class="btn btn-primary" data-github-push-id="${escapeHtml(workflow_id)}">Push to GitHub</button>
            </div>
          </div>
          <div id="ghPushStatus-${escapeHtml(workflow_id)}" style="display:none;"></div>
      `;
      // Agentic-coder status chip (iterations + verify outcome). Only shown
      // when the agentic path produced the output — oneshot runs don't have
      // these fields, which preserves the old UI.
      if (typeof out.iterations === 'number') {
        const verifyOk = out.verify_passed === true;
        const chipColor = verifyOk ? 'var(--green)' : 'var(--amber)';
        const chipLabel = verifyOk
          ? `verify.sh ✓ passed · ${out.iterations} iteration${out.iterations === 1 ? '' : 's'}`
          : `verify.sh ✗ exit ${out.verify_exit_code} · ${out.iterations} iteration${out.iterations === 1 ? '' : 's'}`;
        html += `<div class="code-summary" style="color: ${chipColor};">${escapeHtml(chipLabel)}${out.template ? ` · template: ${escapeHtml(out.template)}` : ''}</div>`;
        if (!verifyOk && out.verify_stderr_tail) {
          html += `<details class="code-summary" style="margin-top:4px;"><summary>verify stderr tail</summary><pre style="white-space:pre-wrap;font-family:var(--font-mono);font-size:0.85em;">${escapeHtml(out.verify_stderr_tail)}</pre></details>`;
        }
      }
      if (isTruncated && !hasFiles) {
        html += `<div class="code-summary" style="color: var(--amber);">⚠ Output was truncated mid-generation (max_tokens exceeded). The download still works — we salvage every complete file from what the model did produce.</div>`;
      } else if (out.summary) {
        html += `<div class="code-summary">${escapeHtml(out.summary)}</div>`;
      }
      if (hasFiles) {
        html += `<div class="file-tree">`;
        for (const f of out.files) {
          const path = f.path || '(no path)';
          const size = (f.content || '').length;
          html += `<div class="file-tree-item">${escapeHtml(path)}<span class="file-size">${size.toLocaleString()} chars</span></div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }
  }

  // ── Repo-task result (work-on-existing-repo workflows) ──
  if (data.repo_task_result) {
    const r = data.repo_task_result;
    const tokens = `${(r.tokens_in || 0).toLocaleString()}→${(r.tokens_out || 0).toLocaleString()} tok`;
    const cost = (r.cost_usd != null) ? `$${r.cost_usd.toFixed(4)}` : '';
    html += `
      <div class="code-card">
        <div class="code-head">
          <div class="code-title">Coder result <span class="meta">· ${r.iterations} iteration${r.iterations === 1 ? '' : 's'}</span></div>
        </div>
    `;
    // PR banner (top of card, prominent). Three states: opened, attempted-but-failed, skipped.
    if (r.pr_url) {
      html += `
        <div class="alert" style="margin:0 0 12px 0;background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.3);">
          <strong style="color: var(--green);">PR opened:</strong>
          <a href="${escapeHtml(r.pr_url)}" target="_blank" rel="noopener" style="color: var(--iris);">${escapeHtml(r.pr_url)}</a>
          ${r.branch_name ? `<span class="meta" style="margin-left:8px;">branch: ${escapeHtml(r.branch_name)}</span>` : ''}
        </div>
      `;
    } else if (r.push_error && r.push_error !== 'no files changed' && r.push_error !== 'auto_pr disabled') {
      html += `
        <div class="alert alert-error" style="margin:0 0 12px 0;">
          <strong>Push to GitHub failed:</strong> ${escapeHtml(r.push_error)}
          <div class="meta" style="margin-top:4px;">The diff below is still valid — apply it manually if you want the change to land.</div>
        </div>
      `;
    } else if (r.push_error) {
      // Benign skip — don't shout, just note it quietly.
      html += `<div class="code-summary" style="color: var(--muted2);">No PR opened (${escapeHtml(r.push_error)}).</div>`;
    }
    if (r.summary) {
      html += `<div class="code-summary">${escapeHtml(r.summary)}</div>`;
    }
    if (Array.isArray(r.files_changed) && r.files_changed.length > 0) {
      html += `<div class="section-label" style="margin-top:14px;">Files changed (${r.files_changed.length})</div>`;
      html += `<div class="file-tree">`;
      for (const p of r.files_changed) {
        html += `<div class="file-tree-item">${escapeHtml(p)}</div>`;
      }
      html += `</div>`;
    } else {
      html += `<div class="code-summary" style="color: var(--amber);">No files changed.</div>`;
    }
    if (r.diff) {
      html += `
        <details style="margin-top:14px;">
          <summary class="code-summary" style="cursor:pointer;">Full diff (${r.diff.length.toLocaleString()} chars)</summary>
          <pre style="white-space:pre-wrap;font-family:var(--font-mono);font-size:0.85em;background:var(--surface2);padding:14px;border-radius:var(--radius-sm);max-height:600px;overflow:auto;margin-top:8px;">${escapeHtml(r.diff)}</pre>
        </details>
      `;
    }
    html += `<div class="code-summary" style="margin-top:10px;color: var(--muted2);font-size:11px;">commit ${escapeHtml((r.commit_sha || '').slice(0, 12))} · ${tokens} · ${cost}</div>`;
    html += `</div>`;
  } else if (data.is_repo_task && status === 'RUNNING') {
    html += `<div class="card empty">Cloning, indexing, and running the Coder against the repo… check back in a few minutes.</div>`;
  } else if (data.is_repo_task && status !== 'COMPLETED' && status !== 'RUNNING') {
    html += `<div class="card empty">Workflow ${escapeHtml(status)}; no result available.</div>`;
  }

  // ── Approval banner ─────────────────────────────────────
  if (awaiting_approval) {
    html += `
      <div class="approval-banner">
        <div class="banner-title">Awaiting approval</div>
        <div class="banner-body">The Architect has produced a design. Approve to continue with SE → Estimator → Reviewer → Documenter, or reject with a reason.</div>
        <div class="approval-buttons">
          <button id="approveBtn" class="btn btn-primary">Approve</button>
          <button id="rejectBtn" class="btn btn-danger">Reject</button>
        </div>
      </div>
    `;
  }

  // ── Task list (with drilldown) ──────────────────────────
  // Repo-task workflows don't run BA/Architect/SE/etc., so the agent-task
  // UI doesn't apply. Skip the section entirely when there's nothing to show.
  if (data.is_repo_task) {
    // Suppress agent-task UI for repo-tasks; the Coder-result card above
    // is the workflow output.
  } else if (tasks.length === 0) {
    html += `<div class="section-label">Tasks (0)</div>`;
    html += `<div class="card empty">Workflow just started — agents will appear here as they're scheduled.</div>`;
  } else {
    html += `<div class="section-label">Tasks (${tasks.length})</div>`;
    html += `<div class="card"><div class="task-list">`;
    for (const t of tasks) {
      const tid = t.id;
      const isExpanded = expandedTasks.has(tid);
      const hasOutput = t.output != null && t.status === 'done';
      const cost = t.cost_usd != null ? `$${parseFloat(t.cost_usd).toFixed(4)}` : '';
      const tokens = (t.tokens_in || t.tokens_out) ? `${t.tokens_in || 0}→${t.tokens_out || 0} tok` : '';
      const model = t.model_used || '';

      html += `
        <div class="task-item${isExpanded ? ' expanded' : ''}" data-task-id="${escapeHtml(tid)}">
          <div class="task-row">
            <span class="role"><span class="chevron">${hasOutput ? '▶' : ''}</span> ${escapeHtml(t.role)}</span>
            <span class="meta-row">
              ${model ? `<span class="meta">${escapeHtml(model)}</span>` : ''}
              ${tokens ? `<span class="meta">${tokens}</span>` : ''}
              ${cost ? `<span class="meta">${cost}</span>` : ''}
              <span class="badge ${t.status}">${t.status}</span>
            </span>
          </div>
          ${hasOutput ? `<div class="task-detail">${renderTaskDetail(t)}</div>` : ''}
        </div>
      `;
    }
    html += `</div></div>`;
  }

  // ── Cost summary (when finished) ────────────────────────
  if (status === 'COMPLETED') {
    html += `<div id="costSummary" class="section-label">Cost summary</div><div class="card empty" id="costSummaryBody">Loading…</div>`;
  }

  root.innerHTML = html;

  // Wire up approval
  if (awaiting_approval) {
    document.getElementById('approveBtn').addEventListener('click', () => approveProject(workflow_id));
    document.getElementById('rejectBtn').addEventListener('click', () => rejectProject(workflow_id));
  }

  // Wire up scaffold download button
  const dlBtn = root.querySelector('[data-download-id]');
  if (dlBtn) dlBtn.addEventListener('click', () => downloadScaffold(dlBtn.dataset.downloadId, dlBtn));

  // Wire up GitHub push button
  const ghBtn = root.querySelector('[data-github-push-id]');
  if (ghBtn) ghBtn.addEventListener('click', () => openGitHubPushDialog(ghBtn.dataset.githubPushId, ghBtn));

  // Wire up task expand/collapse (only on rows that actually have output)
  for (const item of root.querySelectorAll('.task-item')) {
    const row = item.querySelector('.task-row');
    const tid = item.dataset.taskId;
    const hasOutput = item.querySelector('.task-detail') != null;
    if (!hasOutput) continue;
    row.addEventListener('click', () => {
      if (expandedTasks.has(tid)) {
        expandedTasks.delete(tid);
        item.classList.remove('expanded');
      } else {
        expandedTasks.add(tid);
        item.classList.add('expanded');
      }
    });
  }

  // Lazy-load cost summary when finished
  if (status === 'COMPLETED') {
    loadCostSummary(workflow_id);
  }
}

function renderTaskDetail(t) {
  const out = t.output || {};
  const citations = Array.isArray(out._citations) ? out._citations : [];
  // Strip _citations from the JSON we display so the citations card isn't duplicated.
  const visible = {};
  for (const k of Object.keys(out)) if (k !== '_citations') visible[k] = out[k];

  let html = '';
  if (citations.length > 0) {
    html += `<div class="detail-label">Sources (${citations.length})</div><div class="citations">`;
    for (const c of citations) {
      const url = c.url || '#';
      const title = c.title || c.url || '(no title)';
      const cited = c.cited_text || '';
      html += `
        <a class="citation" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">
          <strong>${escapeHtml(title)}</strong>
          <span class="url">${escapeHtml(url)}</span>
          ${cited ? `<div class="citation-quote">"${escapeHtml(cited)}"</div>` : ''}
        </a>
      `;
    }
    html += `</div>`;
  }
  html += `<div class="detail-label">Output</div>`;
  html += `<pre class="json-block">${escapeHtml(JSON.stringify(visible, null, 2))}</pre>`;
  return html;
}

async function downloadScaffold(workflowId, btn) {
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Downloading…';
  try {
    const r = await apiFetch(`/projects/${workflowId}/download`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const blob = await r.blob();
    // Filename comes from Content-Disposition; fallback to a sane default.
    let filename = `${workflowId}-scaffold.zip`;
    const disp = r.headers.get('Content-Disposition') || '';
    const m = disp.match(/filename="([^"]+)"/);
    if (m) filename = m[1];
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) {
    // Inline error next to the button
    const card = btn.closest('.code-card');
    if (card) {
      let existing = card.querySelector('.alert');
      if (existing) existing.remove();
      const el = document.createElement('div');
      el.className = 'alert alert-error';
      el.style.marginTop = '10px';
      el.textContent = 'Download failed: ' + err.message;
      card.appendChild(el);
    }
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}

/**
 * Modal repo picker. Returns a Promise that resolves to:
 *   { repo_owner, repo_name, default_branch, create_if_missing, repo_private }
 * or null if the user cancelled.
 *
 * Options:
 *   allowCreate (default true): show the "create new repo instead" affordance.
 *     The repo-task entry point hides this — you can't run agents against a
 *     repo that doesn't exist yet.
 *   title (default 'Push to GitHub'), confirmLabel (default 'Push').
 */
function showGitHubRepoPicker({ install, repos, defaultNewName, allowCreate = true, title = 'Push to GitHub', confirmLabel = 'Push' }) {
  return new Promise(resolve => {
    const modal = document.createElement('div');
    modal.className = 'gh-picker';
    modal.innerHTML = `
      <div class="gh-picker-backdrop"></div>
      <div class="gh-picker-panel">
        <h2>${escapeHtml(title)}</h2>
        <div class="gh-picker-install">
          Installation: <strong>${escapeHtml(install.account_login)}</strong>
          <span class="meta">(${escapeHtml(install.account_type)})</span>
        </div>
        <input type="text" class="gh-picker-filter" placeholder="Filter repos…" autofocus>
        <div class="gh-picker-repos"></div>
        ${allowCreate ? `
        <div class="gh-picker-divider">or</div>
        <label class="gh-picker-create-toggle">
          <input type="checkbox" class="gh-picker-create-check">
          Create a new repo instead
        </label>
        <div class="gh-picker-create-fields" style="display:none;">
          <input type="text" class="gh-picker-create-name" placeholder="new-repo-name">
          <label><input type="checkbox" class="gh-picker-create-private" checked> Private</label>
        </div>
        ` : ''}
        <div class="gh-picker-actions">
          <button class="btn gh-picker-cancel">Cancel</button>
          <button class="btn btn-primary gh-picker-confirm" disabled>${escapeHtml(confirmLabel)}</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    const reposEl = modal.querySelector('.gh-picker-repos');
    const filterEl = modal.querySelector('.gh-picker-filter');
    const createCheck = allowCreate ? modal.querySelector('.gh-picker-create-check') : null;
    const createFields = allowCreate ? modal.querySelector('.gh-picker-create-fields') : null;
    const createName = allowCreate ? modal.querySelector('.gh-picker-create-name') : null;
    const createPrivate = allowCreate ? modal.querySelector('.gh-picker-create-private') : null;
    const confirmBtn = modal.querySelector('.gh-picker-confirm');
    const cancelBtn = modal.querySelector('.gh-picker-cancel');
    const backdrop = modal.querySelector('.gh-picker-backdrop');

    let selectedRepo = null;

    function renderRepos(filter) {
      const f = (filter || '').toLowerCase();
      const matching = repos.filter(r => r.full_name.toLowerCase().includes(f));
      if (matching.length === 0) {
        reposEl.innerHTML = `<div class="gh-picker-empty">${repos.length === 0 ? 'No repos accessible to this installation.' : 'No repos match.'}</div>`;
        return;
      }
      reposEl.innerHTML = matching.map(r => `
        <div class="gh-picker-repo" data-owner="${escapeHtml(r.owner)}" data-name="${escapeHtml(r.name)}" data-default-branch="${escapeHtml(r.default_branch || 'main')}">
          <span>${escapeHtml(r.full_name)}</span>
          <span class="meta">${r.private ? 'private' : 'public'} · default: ${escapeHtml(r.default_branch)}</span>
        </div>
      `).join('');
      for (const el of reposEl.querySelectorAll('.gh-picker-repo')) {
        el.addEventListener('click', () => {
          for (const s of reposEl.querySelectorAll('.gh-picker-repo.selected')) s.classList.remove('selected');
          el.classList.add('selected');
          selectedRepo = {
            repo_owner: el.dataset.owner,
            repo_name: el.dataset.name,
            default_branch: el.dataset.defaultBranch,
          };
          // Selecting a repo cancels the "create new" mode.
          if (createCheck && createCheck.checked) {
            createCheck.checked = false;
            createFields.style.display = 'none';
          }
          confirmBtn.disabled = false;
        });
      }
    }

    renderRepos('');
    filterEl.addEventListener('input', e => renderRepos(e.target.value));

    if (allowCreate) {
      createCheck.addEventListener('change', () => {
        if (createCheck.checked) {
          createFields.style.display = 'flex';
          // Clear repo selection when switching to create mode.
          for (const s of reposEl.querySelectorAll('.gh-picker-repo.selected')) s.classList.remove('selected');
          selectedRepo = null;
          createName.value = createName.value || defaultNewName;
          createName.focus();
          confirmBtn.disabled = !createName.value.trim();
        } else {
          createFields.style.display = 'none';
          confirmBtn.disabled = true;
        }
      });

      createName.addEventListener('input', () => {
        if (createCheck.checked) confirmBtn.disabled = !createName.value.trim();
      });
    }

    function close(result) {
      document.body.removeChild(modal);
      document.removeEventListener('keydown', onKey);
      resolve(result);
    }
    function onKey(e) {
      if (e.key === 'Escape') close(null);
    }
    document.addEventListener('keydown', onKey);

    cancelBtn.addEventListener('click', () => close(null));
    backdrop.addEventListener('click', () => close(null));
    confirmBtn.addEventListener('click', () => {
      if (createCheck && createCheck.checked) {
        const name = createName.value.trim();
        if (!name) return;
        close({
          repo_owner: install.account_login,
          repo_name: name,
          create_if_missing: true,
          repo_private: createPrivate.checked,
        });
      } else if (selectedRepo) {
        close({
          repo_owner: selectedRepo.repo_owner,
          repo_name: selectedRepo.repo_name,
          default_branch: selectedRepo.default_branch,
          create_if_missing: false,
          repo_private: true,   // ignored when pushing to existing repo
        });
      }
    });
  });
}


/**
 * Drive the picker for the "Work on existing repo" entry point. Returns
 *   { ok: true, install, selection }       on selection
 *   { ok: false, reason: 'cancelled' }     on user cancel
 *   { ok: false, reason: 'no_installations', install_url }  if no GH App connected
 *   { ok: false, reason: 'app_unconfigured' }                if server has no App configured
 *   { ok: false, reason: 'error', message }
 *
 * No `create_if_missing` path here — the agentic Coder needs an existing
 * repo to clone. Use the post-completion push-to-GitHub dialog if you want
 * a fresh repo for a generated scaffold.
 */
async function pickGitHubRepo() {
  try {
    const r = await apiFetch('/github/installations');
    if (!r.ok) return { ok: false, reason: 'error', message: `installations HTTP ${r.status}` };
    const { installations } = await r.json();

    if (!installations || installations.length === 0) {
      const u = await apiFetch('/github/install-url');
      if (!u.ok) return { ok: false, reason: 'app_unconfigured' };
      const { install_url } = await u.json();
      return { ok: false, reason: 'no_installations', install_url };
    }

    let installationId;
    if (installations.length === 1) {
      installationId = installations[0].installation_id;
    } else {
      const choices = installations.map((i, idx) => `${idx + 1}) ${i.account_login} (${i.account_type})`).join('\n');
      const pick = prompt(`Pick a GitHub installation:\n${choices}\n\nEnter number:`, '1');
      if (!pick) return { ok: false, reason: 'cancelled' };
      const idx = parseInt(pick, 10) - 1;
      if (isNaN(idx) || idx < 0 || idx >= installations.length) return { ok: false, reason: 'cancelled' };
      installationId = installations[idx].installation_id;
    }

    const reposResp = await apiFetch(`/github/installations/${installationId}/repos`);
    if (!reposResp.ok) {
      const text = await reposResp.text();
      return { ok: false, reason: 'error', message: `repos HTTP ${reposResp.status}: ${text.slice(0, 200)}` };
    }
    const { repos } = await reposResp.json();
    const install = installations.find(i => i.installation_id === installationId);

    const selection = await showGitHubRepoPicker({
      install,
      repos,
      defaultNewName: '',
      allowCreate: false,
      title: 'Pick a GitHub repo',
      confirmLabel: 'Select',
    });
    if (!selection) return { ok: false, reason: 'cancelled' };
    return { ok: true, install, selection };
  } catch (err) {
    return { ok: false, reason: 'error', message: err.message };
  }
}


async function openGitHubPushDialog(workflowId, btn) {
  const orig = btn.textContent;
  const statusEl = document.getElementById(`ghPushStatus-${workflowId}`);
  const showStatus = (html, isError) => {
    if (!statusEl) return;
    statusEl.style.display = 'block';
    statusEl.style.marginTop = '10px';
    statusEl.innerHTML = `<div class="alert ${isError ? 'alert-error' : ''}">${html}</div>`;
  };

  btn.disabled = true;
  btn.textContent = 'Loading installations…';
  try {
    // 1. List installations the user has connected.
    const r = await apiFetch('/github/installations');
    if (!r.ok) throw new Error(`installations HTTP ${r.status}`);
    const { installations } = await r.json();

    if (!installations || installations.length === 0) {
      // Offer the install flow.
      const u = await apiFetch('/github/install-url');
      if (!u.ok) {
        showStatus('GitHub App not configured on this server (set GITHUB_APP_ID + private key).', true);
        return;
      }
      const { install_url } = await u.json();
      showStatus(
        `No GitHub accounts connected. <a href="${escapeHtml(install_url)}" target="_blank" rel="noopener">Install the Cintelis Swarm app</a>, then come back and click Push to GitHub again.`,
        false,
      );
      return;
    }

    // 2. Pick installation (auto-pick if only one).
    let installationId;
    if (installations.length === 1) {
      installationId = installations[0].installation_id;
    } else {
      const choices = installations.map((i, idx) =>
        `${idx + 1}) ${i.account_login} (${i.account_type})`,
      ).join('\n');
      const pick = prompt(`Pick a GitHub installation:\n${choices}\n\nEnter number:`, '1');
      if (!pick) return;
      const idx = parseInt(pick, 10) - 1;
      if (isNaN(idx) || idx < 0 || idx >= installations.length) return;
      installationId = installations[idx].installation_id;
    }

    // 3. Fetch repos for this installation so the picker can show them.
    btn.textContent = 'Loading repos…';
    const reposResp = await apiFetch(`/github/installations/${installationId}/repos`);
    if (!reposResp.ok) {
      const text = await reposResp.text();
      throw new Error(`repos HTTP ${reposResp.status}: ${text.slice(0, 200)}`);
    }
    const { repos } = await reposResp.json();

    // 4. Show the picker modal. Default repo name derived from project name.
    const install = installations.find(i => i.installation_id === installationId);
    const projectNameEl = document.querySelector('.project-card-name, h1');
    const rawName = projectNameEl ? projectNameEl.textContent.trim() : workflowId.slice(0, 12);
    const safeRepoName = rawName.toLowerCase()
      .replace(/[^a-z0-9-_]+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '')
      .slice(0, 60) || 'swarm-scaffold';
    const defaultNewName = `${safeRepoName}-${workflowId.slice(0, 6)}`;
    const selection = await showGitHubRepoPicker({ install, repos, defaultNewName });
    btn.textContent = orig;
    if (!selection) return;   // user cancelled

    // 5. Push (either to selected existing repo or auto-create the new one).
    btn.disabled = true;
    btn.textContent = 'Pushing…';
    const pushResp = await apiFetch(`/projects/${workflowId}/github-push`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        installation_id: installationId,
        repo_owner: selection.repo_owner,
        repo_name: selection.repo_name,
        open_pr: true,
        create_if_missing: selection.create_if_missing,
        repo_private: selection.repo_private,
      }),
    });
    if (!pushResp.ok) {
      const text = await pushResp.text();
      // The backend now auto-cleans dead installs and returns 410 Gone, which
      // is the cleanest signal we can hook into. Older code paths could also
      // surface "installation token mint failed: 404" as a 502 — match both
      // for backward compatibility during the rolling deploy.
      const looksLikeDeadInstall =
        pushResp.status === 410 || /installation token mint failed: 404/i.test(text);
      if (looksLikeDeadInstall) {
        const u = await apiFetch('/github/install-url');
        const { install_url } = await u.json();
        showStatus(
          `That GitHub installation was removed (uninstalled on GitHub). ` +
          `Our DB has been cleaned up automatically. ` +
          `<a href="${escapeHtml(install_url)}" target="_blank" rel="noopener">Re-install the App</a>, ` +
          `then click Push to GitHub again.`,
          false,
        );
        return;
      }
      throw new Error(`push HTTP ${pushResp.status}: ${text.slice(0, 200)}`);
    }
    const result = await pushResp.json();
    const repoLink = `https://github.com/${result.repo}/tree/${result.branch}`;
    let label = '';
    if (result.repo_created) label = ' (newly created)';
    else if (result.repo_initialised) label = ' (initialised — repo was empty)';
    let msg = `Pushed ${result.files_pushed} files to <a href="${escapeHtml(repoLink)}" target="_blank" rel="noopener">${escapeHtml(result.repo)}</a>${label} · branch <code>${escapeHtml(result.branch)}</code>`;
    if (result.pr_url) {
      msg += ` · <a href="${escapeHtml(result.pr_url)}" target="_blank" rel="noopener">PR #${result.pr_number}</a>`;
    } else if (result.repo_initialised) {
      msg += ' · no PR (initial commit landed on default branch directly)';
    }
    showStatus(msg, false);
  } catch (err) {
    showStatus('Push failed: ' + escapeHtml(err.message), true);
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}

async function loadCostSummary(workflowId) {
  try {
    const r = await apiFetch(`/projects/${workflowId}/costs`);
    if (!r.ok) {
      document.getElementById('costSummaryBody').innerHTML = `<span class="empty">Cost data unavailable.</span>`;
      return;
    }
    const data = await r.json();
    const rows = data.breakdown || [];
    let body = `<div class="card">`;
    if (rows.length === 0) {
      body += `<span class="empty">No completed tasks yet.</span>`;
    } else {
      body += `
        <table class="cost-table">
          <thead>
            <tr><th>Role</th><th>Provider</th><th>Model</th><th class="num">Calls</th><th class="num">In→Out tokens</th><th class="num">Cost</th></tr>
          </thead>
          <tbody>
      `;
      for (const r of rows) {
        const cost = r.cost_usd != null ? `$${parseFloat(r.cost_usd).toFixed(4)}` : '—';
        body += `
          <tr>
            <td>${escapeHtml(r.role)}</td>
            <td><span class="meta">${escapeHtml(r.provider || '')}</span></td>
            <td><span class="meta">${escapeHtml(r.model_used || '')}</span></td>
            <td class="num">${r.calls || 0}</td>
            <td class="num">${r.tokens_in || 0} → ${r.tokens_out || 0}</td>
            <td class="num">${cost}</td>
          </tr>
        `;
      }
      body += `
          </tbody>
        </table>
        <div class="cost-total">
          <span class="label">Total</span>
          <span class="amount">$${(data.total_usd || 0).toFixed(4)}</span>
        </div>
      `;
    }
    body += `</div>`;
    document.getElementById('costSummaryBody').outerHTML = body;
  } catch (err) {
    const el = document.getElementById('costSummaryBody');
    if (el) el.innerHTML = `<span class="empty">Cost data error: ${escapeHtml(err.message)}</span>`;
  }
}

function showApprovalError(msg) {
  const banner = document.querySelector('.approval-banner');
  if (!banner) return;
  let existing = banner.querySelector('.alert');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'alert alert-error';
  el.style.marginTop = '10px';
  el.textContent = msg;
  banner.appendChild(el);
}

async function approveProject(workflowId) {
  try {
    const r = await apiFetch(`/projects/${workflowId}/approve`, { method: 'POST' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    await refreshProject(workflowId);
  } catch (err) {
    showApprovalError('Approve failed: ' + err.message);
  }
}

async function rejectProject(workflowId) {
  const reason = prompt('Reject reason (optional):') || '';
  try {
    const r = await apiFetch(`/projects/${workflowId}/reject`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    await refreshProject(workflowId);
  } catch (err) {
    showApprovalError('Reject failed: ' + err.message);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
