<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TW AI Swarm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Totally Wild AI design tokens (mirrors ads-optimiser-crm) ── */
    :root, [data-theme="dark"] {
      --bg: #0F0F0F;
      --surface: #1A1A1A;
      --surface2: #2E2E2E;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.06);
      --text: #FFFFFF;
      --muted: #C4C4C4;
      --muted2: #A1A1A1;
      --iris: #9B8EE8;
      --iris-strong: #6E5CCC;
      --green: #4ADE80;
      --red: #F87171;
      --amber: #FBBF24;
      --input-bg: #1A1A1A;
      --hover: #2E2E2E;
      --focus: rgba(155,142,232,0.5);
      --selected: rgba(110,92,204,0.12);
      --font-head: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'Geist Mono', 'SF Mono', 'Fira Code', monospace;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-pill: 999px;
      --header-height: 48px;
    }
    [data-theme="light"] {
      --bg: #FFFFFF;
      --surface: #FFFFFF;
      --surface2: #F7F7F7;
      --border: #E2E2E2;
      --border2: #F0F0F0;
      --text: #172B4D;
      --muted: #5E6C84;
      --muted2: #6B778C;
      --iris: #6E5CCC;
      --iris-strong: #6E5CCC;
      --green: #16A34A;
      --red: #DC2626;
      --amber: #D97706;
      --input-bg: #FFFFFF;
      --hover: #F0F0F0;
      --focus: rgba(110,92,204,0.4);
      --selected: #F3F1FC;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.55;
      letter-spacing: -0.2px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ── Top bar ─────────────────────────────────────────── */
    .topbar {
      height: var(--header-height);
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .topbar-logo {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
    }
    .topbar-logo .swarm { color: var(--iris); }
    .topbar-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: 0.5px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
      font-size: 13px;
      transition: background .15s, color .15s, border-color .15s;
    }
    .icon-btn:hover { background: var(--hover); color: var(--text); }

    /* ── Layout ──────────────────────────────────────────── */
    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px;
    }
    .crumb {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .crumb a { color: var(--iris); text-decoration: none; }
    .crumb a:hover { text-decoration: underline; }

    h1 {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .section-label {
      font-size: 11px;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 600;
      margin: 28px 0 10px;
    }

    /* ── Cards ────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
    }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card-title {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .brief-text {
      color: var(--muted);
      white-space: pre-wrap;
      font-size: 14px;
    }

    /* ── Form ────────────────────────────────────────────── */
    label {
      display: block;
      font-size: 11px;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    input[type="text"], textarea {
      width: 100%;
      background: var(--input-bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 16px;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--iris); }
    textarea {
      min-height: 140px;
      resize: vertical;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .checkbox-row input { margin: 0; cursor: pointer; }
    .checkbox-row label {
      margin: 0;
      color: var(--text);
      text-transform: none;
      letter-spacing: -0.2px;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.2px;
      transition: opacity .15s, background .15s, border-color .15s;
    }
    .btn-primary { background: var(--iris-strong); color: #fff; }
    .btn-primary:hover { background: var(--iris); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 0.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--hover); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { opacity: 0.88; }

    /* ── Tasks ───────────────────────────────────────────── */
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .task-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }
    .task-row:hover { background: var(--hover); }
    .task-row .chevron {
      color: var(--muted);
      font-size: 11px;
      transition: transform .15s;
      display: inline-block;
      width: 12px;
    }
    .task-item.expanded .task-row .chevron { transform: rotate(90deg); }
    .task-detail {
      border-top: 0.5px solid var(--border);
      padding: 14px 16px 18px;
      background: var(--surface);
      display: none;
    }
    .task-item.expanded .task-detail { display: block; }
    .detail-label {
      font-size: 10px;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 600;
      margin: 14px 0 8px;
    }
    .detail-label:first-child { margin-top: 0; }
    .json-block {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--muted);
      max-height: 480px;
      overflow: auto;
    }
    .citations { display: flex; flex-direction: column; gap: 6px; }
    .citation {
      display: block;
      padding: 8px 12px;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: var(--text);
      font-size: 13px;
      transition: border-color .15s, background .15s;
    }
    .citation:hover { border-color: var(--iris); }
    .citation .url {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      display: block;
      margin-top: 2px;
      word-break: break-all;
    }
    .citation-quote {
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
      margin-top: 6px;
      padding-left: 10px;
      border-left: 2px solid var(--border);
    }

    /* ── Final docs card ─────────────────────────────────── */
    .docs-card {
      background: linear-gradient(180deg, var(--surface) 0%, var(--surface) 100%);
      border: 0.5px solid var(--iris);
      border-radius: var(--radius);
      padding: 22px 24px;
      margin-bottom: 12px;
    }
    .docs-card .docs-eyebrow {
      font-size: 10px;
      color: var(--iris);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .docs-card h2 {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 12px;
    }
    .docs-card .docs-overview {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 18px;
      line-height: 1.6;
    }
    .docs-section { margin-bottom: 14px; }
    .docs-section h3 {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }
    .docs-section .docs-body {
      color: var(--muted);
      font-size: 14px;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    /* ── Code scaffold card ──────────────────────────────── */
    .code-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 12px;
    }
    .code-card .code-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .code-card .code-title {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .code-card .code-summary {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }
    .file-tree {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      max-height: 280px;
      overflow: auto;
    }
    .file-tree-item {
      padding: 2px 0;
      white-space: nowrap;
    }
    .file-tree-item .file-size {
      color: var(--muted2);
      font-size: 11px;
      margin-left: 10px;
    }

    /* ── Cost summary card ───────────────────────────────── */
    .cost-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .cost-table th, .cost-table td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .cost-table th {
      font-size: 10px;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 600;
    }
    .cost-table td.num { font-family: var(--font-mono); text-align: right; color: var(--muted); }
    .cost-table tr:last-child td { border-bottom: none; }
    .cost-total {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 0.5px solid var(--border);
    }
    .cost-total .label {
      font-size: 11px;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 600;
    }
    .cost-total .amount {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .role {
      font-weight: 600;
      text-transform: capitalize;
      min-width: 110px;
      letter-spacing: -0.2px;
    }
    .meta-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .meta {
      color: var(--muted);
      font-size: 12px;
      font-family: var(--font-mono);
    }

    /* ── Status badges ───────────────────────────────────── */
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: var(--radius-pill);
      border: 0.5px solid transparent;
    }
    .badge.pending  { background: var(--surface2); color: var(--muted); }
    .badge.running, .badge.RUNNING { background: rgba(251,191,36,0.12); color: var(--amber); border-color: rgba(251,191,36,0.3); }
    .badge.done, .badge.COMPLETED { background: rgba(74,222,128,0.12); color: var(--green); border-color: rgba(74,222,128,0.3); }
    .badge.failed, .badge.FAILED, .badge.CANCELED, .badge.TERMINATED { background: rgba(248,113,113,0.12); color: var(--red); border-color: rgba(248,113,113,0.3); }

    /* ── Approval banner ─────────────────────────────────── */
    .approval-banner {
      background: rgba(155,142,232,0.08);
      border: 0.5px solid var(--iris);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 12px;
    }
    .approval-banner .banner-title {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      color: var(--iris);
      margin-bottom: 6px;
    }
    .approval-banner .banner-body {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 12px;
    }
    .approval-buttons { display: flex; gap: 8px; }

    /* ── Landing page ──────────────────────────────────────── */
    .hero {
      margin-bottom: 28px;
    }
    .tagline {
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.6px;
      margin-bottom: 12px;
      line-height: 1.25;
    }
    .pitch {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 70ch;
    }
    .pipeline-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
      counter-reset: step;
    }
    .pipeline-list li {
      counter-increment: step;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px 10px 38px;
      position: relative;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }
    .pipeline-list li::before {
      content: counter(step);
      position: absolute;
      left: 12px;
      top: 10px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--iris-strong);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pipeline-list li strong {
      display: block;
      color: var(--text);
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 1px;
    }
    .pipeline-list li.gate {
      border-color: var(--iris);
      background: var(--selected);
    }
    .pipeline-list li.gate::before {
      content: "⏸";
      background: var(--iris);
      font-size: 10px;
    }
    .outputs-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .outputs-list li {
      padding: 4px 0;
      color: var(--muted);
      font-size: 14px;
      position: relative;
      padding-left: 20px;
    }
    .outputs-list li::before {
      content: "→";
      position: absolute;
      left: 0;
      color: var(--iris);
      font-weight: 700;
    }
    .disclosure {
      color: var(--muted2);
      font-size: 13px;
      font-style: italic;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--amber);
    }

    /* ── Example briefs ─────────────────────────────────────── */
    .examples-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .example-btn {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: border-color .15s, background .15s;
    }
    .example-btn:hover {
      border-color: var(--iris);
      background: var(--selected);
    }
    .example-btn .example-icon {
      color: var(--iris);
      margin-right: 6px;
      font-weight: 700;
    }

    /* ── Tab toggle (Start workflow card) ─────────────── */
    .tab-row {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      padding: 4px;
      border-radius: var(--radius-sm);
      margin-bottom: 18px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 12px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: calc(var(--radius-sm) - 2px);
      transition: background .15s, color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
    }
    .tab-panel[hidden] { display: none; }

    /* ── Selected repo chip (existing-repo tab) ────────── */
    .selected-repo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      font-size: 13px;
    }
    .selected-repo .meta { color: var(--muted2); font-size: 12px; margin-left: 6px; }
    .selected-repo .change-link {
      color: var(--iris);
      font-size: 12px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px 8px;
    }
    .selected-repo .change-link:hover { color: var(--iris-strong); }

    /* ── Projects list (landing page) ─────────────────────── */
    .projects-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .project-card {
      display: block;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, background .15s;
    }
    .project-card:hover {
      border-color: var(--iris);
      background: var(--selected);
    }
    .project-card-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .project-card-name {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    .project-card-brief {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .project-card-meta {
      color: var(--muted2);
      font-size: 11px;
      font-family: var(--font-mono);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ── Inline alert (replaces alert()) ─────────────────── */
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 0.5px solid;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .alert.alert-error {
      background: rgba(248,113,113,0.08);
      border-color: var(--red);
      color: var(--red);
    }
    .alert.alert-info {
      background: rgba(155,142,232,0.08);
      border-color: var(--iris);
      color: var(--iris);
    }

    /* ── Misc ────────────────────────────────────────────── */
    code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      border: 0.5px solid var(--border);
    }

<body>
  <div class="topbar">
    <a href="#/" class="topbar-logo">TW <span class="swarm">Swarm</span></a>
    <div class="topbar-actions">
      <button id="signOutBtn" class="icon-btn" title="Sign out" style="display:none">⎋</button>

    </div>
  </div>

  <div id="tokenModal" class="modal-backdrop" style="display:none">
    <div class="modal">
      <h2>Sign in</h2>
      <p>This swarm requires an API token. Paste it below — it'll be saved locally in your browser.</p>
      <input type="text" id="tokenInput" placeholder="Bearer token" autocomplete="off" />
      <div id="tokenError" class="error-msg" style="margin: 4px 0 0;"></div>
      <div class="modal-buttons">
        <button id="tokenSubmit" class="btn btn-primary">Continue</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="crumb" class="crumb"></div>
    <div id="root"></div>

<script>
const API = '';   // same-origin
const root = document.getElementById('root');
const crumb = document.getElementById('crumb');
let pollTimer = null;

// ─── Auth ───────────────────────────────────────────────
const TOKEN_KEY = 'tw-swarm-token';
const tokenModal = document.getElementById('tokenModal');
const tokenInput = document.getElementById('tokenInput');
const tokenError = document.getElementById('tokenError');
const tokenSubmit = document.getElementById('tokenSubmit');
const signOutBtn = document.getElementById('signOutBtn');
let authRequired = false;

function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
function setToken(t) { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); }
function showSignOutBtn() { signOutBtn.style.display = authRequired ? '' : 'none'; }

async function apiFetch(path, opts = {}) {
  const headers = new Headers(opts.headers || {});
  const tok = getToken();
  if (tok) headers.set('Authorization', 'Bearer ' + tok);
  const r = await fetch(API + path, { ...opts, headers });
  if (r.status === 401) {
    setToken('');
    showTokenModal('Token rejected. Please sign in again.');
    throw new Error('unauthorised');
  }
  return r;
}

function showTokenModal(message = '') {
  tokenError.textContent = message;
  tokenInput.value = '';
  tokenModal.style.display = 'flex';
  setTimeout(() => tokenInput.focus(), 50);
}

function hideTokenModal() { tokenModal.style.display = 'none'; }

tokenSubmit.addEventListener('click', async () => {
  const v = tokenInput.value.trim();
  if (!v) return;
  setToken(v);
  // Validate by calling /auth/check; on 401, token cleared and modal stays
  try {
    const r = await apiFetch('/auth/check');
    if (r.ok) {
      hideTokenModal();
      showSignOutBtn();
      route();  // re-run the router to render the current view
    }
  } catch (_e) { /* apiFetch already handled 401 */ }
});
tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') tokenSubmit.click(); });

signOutBtn.addEventListener('click', () => {
  setToken('');
  showTokenModal('Signed out. Enter your token to continue.');
});

async function bootAuth() {
  // Ask the server whether auth is even on. If off, no modal, no header.
  const r = await fetch(API + '/auth/status');
  if (!r.ok) { authRequired = false; return; }
  const data = await r.json();
  authRequired = !!data.auth_required;
  showSignOutBtn();
  if (!authRequired) return;
  // Auth on — validate any stored token; show modal if missing/invalid
  if (!getToken()) { showTokenModal(); return; }
  try {
    const v = await apiFetch('/auth/check');
    if (!v.ok) showTokenModal();
  } catch (_e) { /* modal already shown */ }
}

// ─── Theme toggle (persisted) ───────────────────────────
const themeBtn = document.getElementById('themeBtn');
const savedTheme = localStorage.getItem('tw-swarm-theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
themeBtn.addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('tw-swarm-theme', next);
});

// ─── Router ─────────────────────────────────────────────
function route() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  const hash = location.hash.replace(/^#\/?/, '');
  if (hash.startsWith('p/')) showProject(hash.substring(2));
  else showSubmit();
}
window.addEventListener('hashchange', route);
window.addEventListener('load', async () => {
  await bootAuth();
  route();
});

// ─── Example briefs (clickable starters) ────────────────
const EXAMPLE_BRIEFS = [
  {
    label: "Log tail anomaly CLI",
    name: "logtail-anomaly-cli",
    brief: "Build a single-binary CLI tool in idiomatic Rust called `logpeek` that tails a structured JSON log file (one object per line) and flags anomalies in real time. Detect (1) error-level spikes using a rolling 60-second window with a configurable z-score threshold, and (2) new error signatures not seen in the prior 10 minutes. Output flagged events to stderr with ANSI color; pass through normal lines unchanged to stdout so it composes with Unix pipes. Support `--window`, `--threshold`, and `--field` flags. Must handle files that rotate mid-stream and process at least 50k lines/sec on a laptop."
  },
  {
    label: "Webhook replay service",
    name: "webhook-replay-service",
    brief: "Design and scaffold a small Python service (FastAPI + async SQLAlchemy) that sits in front of downstream webhook consumers and provides durable delivery with replay. Incoming POSTs are persisted, signed with HMAC-SHA256, and forwarded to a configured target URL with exponential backoff (max 6 attempts over ~1 hour). Expose `/events`, `/events/{id}/replay`, and `/events?status=failed` endpoints with cursor pagination. Acceptance: survive a 10-minute downstream outage without event loss, deliver in-order per source, and sustain 500 req/s on a single 2-vCPU container. Choose between Postgres LISTEN/NOTIFY and Redis Streams for the retry queue and justify the pick. Include Docker Compose and a pytest suite with a fake downstream."
  },
  {
    label: "Programmatic SEO auditor",
    name: "pseo-content-auditor",
    brief: "Build a Python CLI + small FastAPI service that audits a programmatic-SEO site (think 5k-50k templated landing pages) for quality issues that hurt rankings in 2026. Given a sitemap URL, crawl a sampled subset and score each page on: thin content (word count + unique n-gram ratio vs. siblings), near-duplicate clusters (MinHash/LSH), title/meta/H1 template collisions, internal-link orphaning, and Core Web Vitals from CrUX where available. Emit a JSON report plus a Markdown executive summary grouped by issue severity. Respect robots.txt and rate-limit to 2 rps per host by default. Target users: in-house SEO leads at Series-A SaaS companies who need a defensible prioritized fix list, not a vanity score."
  },
];

// ─── Example feature briefs (clickable starters for existing-repo work) ─
const EXAMPLE_FEATURE_BRIEFS = [
  {
    label: "Observability bundle",
    brief: "Add API documentation and a health check.\n\n1. Add springdoc-openapi-starter-webmvc-ui (latest 2.x compatible with Spring Boot 3.4) to pom.xml. Expose /v3/api-docs and /swagger-ui.html publicly (allow them through the SecurityFilterChain alongside /api/auth/login). Annotate AuthController and CalculatorController with @Operation/@ApiResponse where it adds clarity, but do not over-document trivial fields.\n\n2. Add spring-boot-starter-actuator. Expose only the health endpoint at /actuator/health, also publicly. Do not expose env, beans, or other actuator endpoints — that would leak config.\n\nTests: extend AuthIntegrationTest (or add SmokeTest) with a test that GETs /actuator/health and expects 200 with status:UP, and a test that GETs /v3/api-docs and expects 200 with a non-empty paths object. Update README accordingly."
  },
  {
    label: "History endpoint + page",
    brief: "Surface the calculation history through the API and the UI.\n\n1. Backend: add GET /api/history (JWT-protected) that returns the last 50 CalculationRecord rows ordered by created_at desc. Reuse CalculationRepository; add a method like findTop50ByOrderByCreatedAtDesc. Return [{id, a, b, op, result, createdAt}] JSON.\n\n2. Frontend: add a /history route (HistoryPage.tsx) that uses RTK Query to fetch /api/history and renders a simple table. Add a \"History\" link on the Calculator page that navigates to it, and a \"Back\" link on the History page that returns to /calculator.\n\nTests: backend integration test that performs a calculation, then calls /api/history and asserts the new row appears first; frontend Vitest that mocks the query and asserts the table renders 3 sample rows. Update README to document the new endpoint and route."
  },
  {
    label: "Scientific operations",
    brief: "Extend the calculator with three scientific operations and surface them in the UI.\n\n1. Backend: add sqrt(a), pow(a, b), log(a, base=10) to the Calculator domain class with proper edge cases (sqrt of negative throws ArithmeticException; log of zero/negative likewise). Extend CalculatorController with /api/calculate now accepting an \"op\" query param including sqrt, pow, log in addition to the existing add/sub/mul/div. Persist these like the existing operations. Reject bad input with 400 + a clear message.\n\n2. Frontend: add three buttons (sqrt, pow, log) on the Calculator page. sqrt and log only need one operand (hide the b input when those are selected); pow uses both. Wire them through the existing RTK Query mutation.\n\nTests: CalculatorTest covers each new op including the error cases; CalculatorControllerTest covers the new query-param routing; one frontend test that clicks the sqrt button and confirms the right payload is sent."
  },
  {
    label: "Per-user history + sign out",
    brief: "Two small but related improvements: scope the calculation history per user, and add a sign-out button.\n\n1. Backend: CalculationRecord currently has no owner. Add a \"username\" column (nullable=false, default-backfilled to \"testuser\" for any pre-existing rows via a Hibernate update or a one-shot SQL in application.properties via spring.jpa.properties.hibernate.hbm2ddl.import_files). On every persist, fill username from SecurityContextHolder.getContext().getAuthentication().getName(). The /api/history endpoint must filter by current username only — never return another user's rows.\n\n2. Frontend: add a \"Sign out\" button on the Calculator page header. Clicking it dispatches clearToken() (already in authSlice) and navigates to /login. Style it consistently with the Sign in button.\n\nTests: backend integration test that logs in as testuser, posts a calculation, confirms /api/history returns it; logs in as a different user (add a second seeded user \"alice\" / \"AnotherPass123!\" in InMemoryUserStore), and confirms /api/history is empty for them. Frontend test that clicks Sign out and asserts navigation + the token is cleared in the Redux store."
  },
  {
    label: "Rate limiting on /api/calculate",
    brief: "Add per-user rate limiting on /api/calculate to prevent runaway clients.\n\nApproach: a Spring Filter (registered after JwtAuthFilter so the username is available via SecurityContextHolder) that uses a simple in-memory token-bucket per username. Bucket: 10 requests per minute, refill 1 token every 6 seconds. When the bucket is empty, return HTTP 429 with body {\"error\": \"rate_limit_exceeded\", \"retry_after_seconds\": <int>}. Add a \"Retry-After\" response header. Anonymous / unauthenticated requests should NOT pass this filter — they're already rejected by Spring Security earlier.\n\nDo not pull in Bucket4j or external libraries unless the implementation is meaningfully simpler — a ConcurrentHashMap<String, AtomicLong[]> with timestamp-based refill is sufficient and keeps the dependency surface small.\n\nTests: integration test that bursts 11 requests inside one second from a single authenticated user, asserts the 11th gets 429 with Retry-After set. A separate test that confirms two different users each get their own bucket (one user's quota doesn't affect the other). A test that confirms /api/auth/login is NOT rate-limited (login attempts are public and pre-auth)."
  },
  {
    label: "Refresh tokens",
    brief: "Extend the JWT auth flow with refresh tokens.\n\n1. Issue a refresh token alongside the access token at /api/auth/login. Access token TTL stays at the existing value (likely 1h); refresh token TTL = 30 days. Use a separate signing claim (e.g. \"typ\":\"refresh\") so an access token can't be replayed as a refresh.\n\n2. Add POST /api/auth/refresh that accepts {\"refresh_token\": \"...\"} and returns {\"access_token\": \"...\", \"refresh_token\": \"...\"} — issue a new pair (refresh-token rotation) and revoke the old refresh token. Store revoked-token JTIs in a small in-memory set with the same TTL as the refresh token (good enough for this template; document that production needs a persistent revocation store).\n\n3. The login response shape changes to {\"access_token\":\"...\", \"refresh_token\":\"...\"} — update LoginPage.tsx to read the new field names. Add a token field on authSlice for the refresh token; HomePage.tsx shouldn't change.\n\nTests: integration tests for the happy path (login, refresh, refresh again with the new one), the rotation guarantee (old refresh token is rejected after one use), and the typ claim (an access token rejected at /api/auth/refresh, a refresh token rejected at /api/hello/me)."
  },
  {
    label: "CORS configurable origins",
    brief: "Make the backend's CORS allowed-origins configurable via application.properties so the same image can be deployed in dev / staging / prod with different origins.\n\nAdd a property `app.cors.allowed-origins` (comma-separated list, default `http://localhost:5173`) and bind it through @Value or @ConfigurationProperties. Use Spring's CorsConfigurationSource bean wired into the SecurityFilterChain — set allowed methods to GET, POST, OPTIONS; allowed headers to Authorization, Content-Type; expose Authorization in the response so the frontend can read it; allowCredentials=true; max age 3600.\n\nReplace any hardcoded CorsConfiguration if one already exists; otherwise add the bean fresh. The default value MUST work for the existing local-dev flow (frontend at :5173 talking to backend at :8080).\n\nTests: integration test that issues an OPTIONS request from `http://localhost:5173` against /api/calculate and asserts a 200 with the right Access-Control-Allow-* headers. A second test that overrides app.cors.allowed-origins via @TestPropertySource to `https://prod.example.com` and asserts an OPTIONS from localhost:5173 is rejected (no Allow-Origin header, or 403). A third test that pre-flight from an allowed origin to the wrong method returns 405 / no Allow-Methods."
  },
];

// ─── Submit view ────────────────────────────────────────
async function showSubmit() {
  crumb.innerHTML = '';
  root.innerHTML = `
    <div class="hero">
      <div class="tagline">From brief to buildable scaffold in one orchestrated pass.</div>
      <div class="pitch">TW Swarm is a Cintelis demonstrator that routes a software project brief through eight specialist agents — running on Anthropic Claude and xAI Grok — to produce the artifacts a senior team would draft before touching an IDE. Drop in a one-paragraph brief; get back requirements, architecture, estimates, a review pass, docs, and a runnable scaffold.</div>
    </div>

    <div class="section-label">How it works</div>
    <div class="card">
      <ol class="pipeline-list">
        <li><strong>Business Analyst</strong>Extracts goals, users, and functional requirements.</li>
        <li><strong>Researcher</strong>Surveys relevant tech, patterns, and prior art.</li>
        <li><strong>Architect</strong>Proposes stack, components, and system design.</li>
        <li class="gate"><strong>Human approval</strong>You review and gate before build work begins.</li>
        <li><strong>Software Engineer</strong>Decomposes architecture into an implementation plan.</li>
        <li><strong>Estimator</strong>Sizes effort, risk, and delivery timeline.</li>
        <li><strong>Reviewer</strong>Audits the plan for gaps, conflicts, and smells.</li>
        <li><strong>Documenter</strong>Produces README, setup, and developer-facing docs.</li>
        <li><strong>Coder</strong>Emits a runnable scaffold aligned to the plan.</li>
      </ol>
    </div>

    <div class="section-label">What you get</div>
    <div class="card">
      <ul class="outputs-list">
        <li>Structured requirements document with user stories and acceptance criteria</li>
        <li>Architecture write-up covering stack, components, and data flow</li>
        <li>Implementation plan with task breakdown and effort estimates</li>
        <li>Automated review report flagging risks and open questions</li>
        <li>Developer documentation (README, setup, conventions)</li>
        <li>Runnable code scaffold you can clone and extend</li>
      </ul>
      <div class="disclosure" style="margin-top: 14px;">The generated code is a starter scaffold meant to accelerate day one — not finished, production-ready software.</div>
    </div>

    <div class="section-label">Start a new workflow</div>
    <div class="card">
      <div class="tab-row" role="tablist">
        <button class="tab-btn active" data-tab="repo" type="button" role="tab">Work on existing repo</button>
        <button class="tab-btn" data-tab="new" type="button" role="tab">Generate new scaffold</button>
      </div>

      <!-- Existing-repo tab -->
      <div class="tab-panel" data-tab-panel="repo">
        <label>Try a feature brief</label>
        <div class="examples-grid" id="featureExamplesGrid"></div>

        <form id="repoTaskForm">
          <label>GitHub repo</label>
          <div id="selectedRepoDisplay" class="selected-repo" hidden>
            <span><strong id="selectedRepoFullName"></strong><span class="meta" id="selectedRepoMeta"></span></span>
            <button type="button" class="change-link" id="changeRepoBtn">Change</button>
          </div>
          <button type="button" id="repoPickerBtn" class="btn">Pick a repo…</button>

          <label for="branch">Branch</label>
