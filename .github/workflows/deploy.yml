name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from the Actions UI

# One deploy at a time, cancel outdated ones
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: lean-agent-app
  ECS_CLUSTER: lean-agent-cluster
  API_SERVICE: lean-agent-api
  WORKER_SERVICE: lean-agent-worker

permissions:
  id-token: write    # for OIDC
  contents: read

jobs:
  build-and-push:
    name: Build + push image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "image-tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "full-tag=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "latest-tag=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.full-tag }}
            ${{ steps.meta.outputs.latest-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Roll services
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      # deploy/ecs/worker-task-def.json is generated by Terraform's
      # local_file.worker_task_def_json resource and is NOT committed. On a
      # fresh clone the render-task-definition step below would fail without
      # this sync step.
      #
      # Backend config: bucket/table/KMS created by deploy/bootstrap/ (one-time).
      # TF_STATE_BUCKET / TF_STATE_DDB_TABLE / TF_STATE_KMS_KEY_ARN are GitHub
      # repo variables (not secrets — bucket names aren't sensitive, and access
      # is IAM-gated via the assumed deploy role).
      - name: Sync worker task def from Terraform
        working-directory: deploy/terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=deploy/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_DDB_TABLE }}" \
            -backend-config="encrypt=true" \
            -backend-config="kms_key_id=${{ vars.TF_STATE_KMS_KEY_ARN }}"
          terraform apply -target=local_file.worker_task_def_json -auto-approve

      # The worker service uses a classic task definition. We render a new
      # revision with the new image and deploy it.
      - name: Update worker task definition
        id: worker-td
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/ecs/worker-task-def.json
          container-name: worker
          image: ${{ needs.build-and-push.outputs.image-tag }}

      - name: Deploy worker
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.worker-td.outputs.task-definition }}
          service: ${{ env.WORKER_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # The API service is Express Mode -- use the dedicated action.
      # It handles the Express API shape (update-express-gateway-service).
      - name: Deploy API (Express Mode)
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: ${{ env.API_SERVICE }}
          image: ${{ needs.build-and-push.outputs.image-tag }}
          cluster: ${{ env.ECS_CLUSTER }}

      - name: Smoke test
        run: |
          # Resolve the Express-managed ALB DNS and hit /health directly.
          # Express Mode provisions its own ALB per service; describe-load-balancers
          # without a Names filter returns all ALBs in the account, which is fine
          # for single-project accounts. Narrow the query if you run multiple
          # Express services in the same account.
          DNS=$(aws elbv2 describe-load-balancers \
            --query 'LoadBalancers[*].DNSName' --output text)

          if [ -z "$DNS" ]; then
            echo "::error::Could not resolve ALB DNS"
            exit 1
          fi

          for i in 1 2 3 4 5; do
            if curl --fail -sS "https://${DNS}/health"; then
              echo "/health OK"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          echo "::error::Smoke test failed"
          exit 1
