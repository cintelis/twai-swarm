name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python:
    name: Python lint + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt ruff pytest pytest-asyncio

      - name: Ruff
        run: ruff check app/

      - name: Syntax check all modules
        run: python -m compileall -q app/

      - name: Import check (catches missing deps fast)
        run: |
          python -c "from app import api, worker, workflows, activities, router, db, config"

      - name: Pytest (Sprint 6 agentic Coder unit tests)
        run: pytest tests/ -q

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: docker build -t lean-agent:ci .

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend -- just validate)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  models:
    # Pings every model in app.router.MODELS with a 1-token request. Catches
    # SDK incompatibilities (httpx kwargs), stale model strings, and provider
    # auth issues BEFORE they hit production retry loops.
    #
    # Requires repo secrets ANTHROPIC_API_KEY and XAI_API_KEY (the same values
    # that live in AWS Secrets Manager). Skips silently if either is missing
    # to avoid blocking PRs from forks.
    name: Model smoke ping
    runs-on: ubuntu-latest
    if: github.event_name == 'push'  # don't run on PRs from forks (no secrets)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Ping every model
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] || [ -z "$XAI_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY or XAI_API_KEY missing — skipping model smoke"
            exit 0
          fi
          python scripts/smoke_models.py
